version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/glamcrm.db
      - AUTH_SECRET=${AUTH_SECRET}
      - NODE_ENV=production
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/auth"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # For production with PostgreSQL, uncomment below:
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: glamcrm
  #     POSTGRES_USER: glamcrm
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data
  #   restart: unless-stopped

volumes:
  app-data:
  # pg-data:
